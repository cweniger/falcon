# =============================================================================
# 11_flow_words: Two-word inference using NSF Flow estimators on 64x64 images.
#
# Improves on 09_two_words:
#   - 64x64 image (clearer letters)
#   - NSF normalizing-flow estimators (non-Gaussian posteriors)
#   - Hypercube prior (compatible with Flow)
#   - Larger buffer (4096 samples)
#
# z_hi  = [x_H, y_H, x_I, y_I]            ~ Uniform(-1,1)^4
# z_bye = [x_B, y_B, x_Y, y_Y, x_E, y_E] ~ Uniform(-1,1)^6
# =============================================================================

logging:
  wandb:
    enabled: false
  local:
    enabled: true
    dir: ${paths.graph}

paths:
  imports: ["./src"]
  graph: ${run_dir}/graph
  samples: ${run_dir}/samples

buffer:
  min_samples: 4096
  max_samples: 4096
  validation_samples: 512
  simulate_count: 512
  simulate_when_full: true
  simulate_interval: 5
  snapshot_every: 10

graph:
  z_hi:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Hypercube
      priors:
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
    estimator:
      _target_: falcon.estimators.Flow
      max_epochs: 500
      net_type: nsf
      lr: 0.001
      gamma: 0.5
      embedding:
        _target_: model.WordCNN
        out_dim: 64
        _input_: [x]
      batch_size: 128
      early_stop_patience: 64
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
      use_best_models: true
    ray:
      num_gpus: 0.5

  z_bye:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Hypercube
      priors:
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
    estimator:
      _target_: falcon.estimators.Flow
      max_epochs: 500
      net_type: nsf
      lr: 0.001
      gamma: 0.5
      embedding:
        _target_: model.WordCNN
        out_dim: 64
        _input_: [x]
      batch_size: 128
      early_stop_patience: 64
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
      use_best_models: true
    ray:
      num_gpus: 0.5

  x:
    parents: [z_hi, z_bye]
    simulator:
      _target_: model.TwoWordSimulator
      word1: "HI"
      word2: "BYE"
      image_size: 64
      font_size: 14
      noise_level: 4.0
    observed: "./data/obs.npz['x']"

sample:
  posterior:
    n: 500
