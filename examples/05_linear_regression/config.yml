# =============================================================================
# Falcon Example Configuration: 05_linear_regression
# -----------------------------------------------------------------------------
# Linear regression with sinusoidal basis functions:
#   x = Phi @ theta + noise,  mu = Phi @ theta (noiseless signal)
#   Phi[i, k] = sin((k+1) * t_i), t in [0, 2*pi), 1000 bins, 10 parameters
#
# Prior: theta ~ N(0, I)
# Noise: N(0, sigma^2 * I), sigma = 0.1
#
# This example has an analytic posterior for validation:
#   Sigma_post = (Phi^T Phi / sigma^2 + I)^{-1}
#   mu_post    = Sigma_post @ Phi^T @ y / sigma^2
#
# Usage:
#   cd examples/05_linear_regression
#   python data/gen_mock_data.py
#   falcon launch -o output/run
#   falcon sample posterior -o output/run
# =============================================================================

# -----------------------------------------------------------------------------
# Logging configuration
# -----------------------------------------------------------------------------
logging:
  wandb:
    enabled: false
    project: falcon_examples
    group: 05_linear_regression
    dir: ${run_dir}
  local:
    enabled: true
    dir: ${paths.graph}
  console:
    level: DEBUG

# -----------------------------------------------------------------------------
# Directory configuration
# -----------------------------------------------------------------------------
paths:
  imports: ["./src"]
  graph: ${run_dir}/graph
  samples: ${run_dir}/samples

# -----------------------------------------------------------------------------
# Training buffer parameters
# -----------------------------------------------------------------------------
buffer:
  min_samples: 2048
  max_samples: 2048
  validation_samples: 256
  simulate_count: 128
  simulate_chunk_size: 128
  simulate_when_full: true
  simulate_interval: 0.1
  snapshot_every: 1

# -----------------------------------------------------------------------------
# Graph definition using SNPE_gaussian estimator
# -----------------------------------------------------------------------------
graph:
  theta:
    evidence: [x]
    scaffolds: [mu]

    simulator:
      _target_: falcon.priors.Product
      priors:
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]
        - ['normal', 0.0, 1.0]

    estimator:
      _target_: falcon.estimators.GaussianFullCov
      max_epochs: 100
      lr: 0.01
      gamma: 0.5
      embedding:
        _target_: falcon.embeddings.DynamicSVD
        _input_: [x, mu]
        n_components: 32
        momentum: 0.1
      batch_size: 128
      prior_epochs: 40
      early_stop_patience: 128
      hidden_dim: 128
      num_layers: 3
      momentum: 0.01

      min_var: 1.0e-20
      eig_update_freq: 1

      betas: [0.9, 0.9]
      lr_decay_factor: 1
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
      cache_sync_every: 1
      cache_on_device: false

    sample_chunk_size: 128
    ray:
      num_gpus: 1

  mu:
    parents: [theta]
    simulator:
      _target_: model.SignalSimulator
      n_bins: 1000
    sample_chunk_size: 128
    ray:
      num_gpus: 0

  x:
    parents: [mu]
    simulator:
      _target_: model.NoiseSimulator
      sigma: 0.1
    observed: "./data/mock_data.npz['x']"
    sample_chunk_size: 128
    ray:
      num_gpus: 0

# -----------------------------------------------------------------------------
# Sampling configuration
# -----------------------------------------------------------------------------
sample:
  posterior:
    n: 1000
