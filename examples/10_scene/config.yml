# =============================================================================
# 10_scene: Three-component inference — word positions, circle, background.
#
# z_word  = [x_H, y_H, x_I, y_I]    ~ Uniform(-1,1)^4
# z_dot   = [cx, cy, r]              ~ Uniform(-1,1)^3
# z_noise = [log_bg]                 ~ Uniform(-1,1)^1
# x = composite 64x64 image
#
# Three parallel GaussianFullCov networks sharing ~0.33 GPU each.
# =============================================================================

logging:
  wandb:
    enabled: false
  local:
    enabled: true
    dir: ${paths.graph}

paths:
  imports: ["./src"]
  graph: ${run_dir}/graph
  samples: ${run_dir}/samples

buffer:
  min_samples: 2048
  max_samples: 2048
  validation_samples: 256
  simulate_count: 256
  simulate_when_full: true
  simulate_interval: 5
  snapshot_every: 10

graph:
  z_word:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Product
      priors:
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
    estimator:
      _target_: falcon.estimators.GaussianFullCov
      max_epochs: 600
      lr: 0.001
      gamma: 0.3
      embedding:
        _target_: model.SceneCNN
        out_dim: 64
        _input_: [x]
      batch_size: 128
      early_stop_patience: 64
      hidden_dim: 64
      num_layers: 3
      momentum: 0.05
      min_var: 1.0e-20
      eig_update_freq: 1
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
    ray:
      num_gpus: 0.34

  z_dot:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Product
      priors:
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
        - ['uniform', -1.0, 1.0]
    estimator:
      _target_: falcon.estimators.GaussianFullCov
      max_epochs: 600
      lr: 0.001
      gamma: 0.3
      embedding:
        _target_: model.SceneCNN
        out_dim: 64
        _input_: [x]
      batch_size: 128
      early_stop_patience: 64
      hidden_dim: 64
      num_layers: 3
      momentum: 0.05
      min_var: 1.0e-20
      eig_update_freq: 1
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
    ray:
      num_gpus: 0.34

  z_noise:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Product
      priors:
        - ['uniform', -1.0, 1.0]
    estimator:
      _target_: falcon.estimators.GaussianFullCov
      max_epochs: 600
      lr: 0.001
      gamma: 0.3
      embedding:
        _target_: model.BgCNN
        out_dim: 16
        _input_: [x]
      batch_size: 128
      early_stop_patience: 64
      hidden_dim: 32
      num_layers: 2
      momentum: 0.05
      min_var: 1.0e-20
      eig_update_freq: 1
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20.0
    ray:
      num_gpus: 0.32

  x:
    parents: [z_word, z_dot, z_noise]
    simulator:
      _target_: model.SceneSimulator
      word: "HI"
      image_size: 64
      font_size: 14
      noise_level: 4.0
    observed: "./data/obs.npz['x']"

sample:
  posterior:
    n: 500
