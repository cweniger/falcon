# Logging configuration
logging:
  wandb:
    enabled: false
    project: falcon_examples
    group: 02_bimodal_rounds_fill
    dir: ${run_dir}
  local:
    enabled: true
    dir: ${paths.graph}

# Directory configuration
paths:
  imports: ["./src"]
  graph: ${run_dir}/graph
  samples: ${run_dir}/samples

# Training buffer parameters
buffer:
  min_samples: 8000
  max_samples: 1000000
  validation_samples: 256
  simulate_count: 8000
  simulate_when_full: true
  simulate_interval: 600

# Graph definition using declarative YAML
graph:
  z:
    evidence: [x]
    simulator: 
      _target_: falcon.priors.Hypercube
      priors: 
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
    estimator:
      _target_: falcon.estimators.Flow
      max_epochs: 300
      net_type: nsf  # zuko_gf, maf, nice, sospf, naf, gf
      lr: 0.003
      gamma: 0.5
      embedding:
        _target_: model.E
        _input_: [x]
      batch_size: 128
      early_stop_patience: 32
      theta_norm: true
      norm_momentum: 0.0005
      use_log_update: true
      adaptive_momentum: false
      lr_decay_factor: 0.5
      lr_patience: 16
      discard_samples: false
      log_ratio_threshold: -20
      sample_reference_posterior: false
      use_best_models: true
    ray:
      num_gpus: 1
  
  m:
    parents: [z]
    simulator: model.Signal

  n:
    simulator: model.Noise

  x:
    parents: [m, n]
    simulator: model.Add
    observed: "./data/x_obs_10dim.npy"

sample:
  prior:
    n: 1000
  proposal:
    n: 1000
  posterior:
    n: 1000
