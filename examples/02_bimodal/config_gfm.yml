# GaussianizedFlowMatching on the 10D bimodal example.
# Same graph/model/data as config_regular.yml; estimator swapped to the
# Gaussian-preconditioned flow-matching estimator.

logging:
  wandb:
    enabled: false
    project: falcon_examples
    group: 02_bimodal_gfm
    dir: ${run_dir}
  local:
    enabled: true
    dir: ${paths.graph}

paths:
  imports: ["./src"]
  graph: ${run_dir}/graph
  samples: ${run_dir}/samples

buffer:
  min_samples: 2048
  max_samples: 8192
  validation_samples: 256
  simulate_count: 512
  simulate_when_full: false
  simulate_interval: 15

graph:
  z:
    evidence: [x]
    simulator:
      _target_: falcon.priors.Product
      priors:
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
        - ['uniform', -10000.0, 10000.0]
    estimator:
      _target_: falcon.estimators.GaussianizedFlowMatching
      max_epochs: 200
      lr: 0.005
      gamma: 0.5
      embedding:
        _target_: model.E
        _input_: [x]
      batch_size: 256
      early_stop_patience: 32
      prior_epochs: 0
      # Gaussian preconditioner
      hidden_dim: 128
      num_layers: 3
      momentum: 0.01
      eig_update_freq: 1
      # Flow-matching residual net
      flow_hidden: 256
      flow_layers: 4
      time_dim: 64
      ema_decay: 0.999
      sample_steps: 64
      density_steps: 32
      divergence: hutch
      n_probe: 4
      # Optimizer
      lr_decay_factor: 0.5
      lr_patience: 16
      # Inference
      discard_samples: false
      num_proposals: 256
      proposal_mixture_beta: 0.5
      prior_sigma_bound: 6.0
      use_best_models: true
    ray:
      num_gpus: 1

  m:
    parents: [z]
    simulator: model.Signal

  n:
    simulator: model.Noise

  x:
    parents: [m, n]
    simulator: model.Add
    observed: "./data/x_obs_10dim.npy"

sample:
  prior:
    n: 1000
  proposal:
    n: 1000
  posterior:
    n: 1000
