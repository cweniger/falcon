# =============================================================================
# Falcon Example Configuration: 06_spectral_analysis (tokenized variant)
# -----------------------------------------------------------------------------
# Same as config.yml but with an intermediate "tokens" node that caches the
# expensive STFT tokenization. Training operates on compact token tensors
# instead of re-running the STFT every epoch.
#
# Graph: theta -> x -> tokens   (theta uses evidence: [tokens])
#
# NOTE: This config will currently FAIL during proposal/posterior sampling
# because falcon's inference graph does not include intermediate deterministic
# nodes (tokens has no estimator and no evidence).
# =============================================================================

logging:
  wandb:
    enabled: false
    project: falcon_examples
    group: 06_spectral_analysis
    dir: ${run_dir}
  local:
    enabled: true
    dir: ${paths.graph}

paths:
  import: "./src"
  buffer: ${run_dir}/sim_dir
  graph: ${run_dir}/graph_dir
  samples: ${run_dir}/samples_dir

buffer:
  min_samples: 4096
  max_samples: 4096
  validation_samples: 256
  simulate_count: 128
  simulate_when_full: false
  simulate_interval: 1
  store_fraction: 0.1

graph:
  theta:
    evidence: [tokens]
    sample_chunk_size: 8

    simulator:
      _target_: falcon.priors.Product
      priors:
        #- ['uniform', 2.749e-3, 2.751e-3]
        #- ['uniform', 0.996, 1.004]
        #- ['uniform', 1.400, 1.600]
        - ['uniform', 2.5e-3, 3.0e-3]
        - ['uniform', 0.8, 1.2]
        - ['uniform', 1.200, 1.800]

    estimator:
      _target_: falcon.estimators.Gaussian
      loop:
        num_epochs: 500
        batch_size: 16
        early_stop_patience: 32
      network:
        hidden_dim: 128
        num_layers: 3
        momentum: 0.10
        min_var: 1.0e-25
        eig_update_freq: 1
      embedding:
        _target_: fuge.TransformerEmbedding
        d_in: 5
        d_model: 64
        n_heads: 4
        n_layers: 2
        d_ff: 256
        dropout: 0.1
        _input_:
          _target_: falcon.embeddings.RunningNorm
          momentum: 0.01
          dim: [0, 1]
          output_dtype: float32
          _input_:
            _target_: model.TokenEmbed
            phase_mode: center
            _input_: [tokens]
      optimizer:
        lr: 0.001
        lr_decay_factor: 0.5
        scheduler_patience: 16
      inference:
        gamma: 1.0
        discard_samples: false
        log_ratio_threshold: -20.0

    ray:
      num_gpus: 0.3

  x:
    parents: [theta]
    sample_chunk_size: 8
    simulator:
      _target_: model.Simulator
      noise_sigma: 1.0
      N: 1000000
    observed: "./data/obs_1M.npz['x']"
    ray:
      num_gpus: 0.3

  tokens:
    parents: [x]
    sample_chunk_size: 8
    simulator:
      _target_: model.Tokenizer
      k: 20240
      n_peaks: 3
      n_dlnf: 11
      dlnf_min: 0.0
      dlnf_max: 0.05
    ray:
      num_gpus: 0.3

sample:
  prior:
    n: 1000
  posterior:
    n: 1000
